<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1年の軌跡と、これから</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           基本設定（CSS）
           ========================================= */
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            text-align: center;
            /* 🌟 変更点1：背景を神社のエントランスと同じ紺色のグラデーションに */
            background: linear-gradient(to bottom, #001f3f, #1a1a3a); /* 深い紺色 */
            color: #fff; /* 全体の文字色は白に */
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロールバーを隠す */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .wafu-font {
            font-family: 'Kiwi Maru', serif;
        }

        /* =========================================
           📅 カレンダー（スライドショー）部分
           ========================================= */
        #calendar-section {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 2s ease; /* カウントダウンへの切り替え用 */
            z-index: 5;
        }

        /* カレンダーの大枠（3D空間を作る） */
        .calendar-wrapper {
            position: relative;
            width: 85vw;
            max-width: 320px;
            height: 420px;
            perspective: 1500px; /* 立体感（奥行き）を出す */
            margin-top: 30px;
        }

        /* カレンダーのリング（上部にある銀色の金具） */
        .ring {
            position: absolute;
            top: -18px;
            width: 18px;
            height: 38px;
            background: linear-gradient(to right, #ccc, #fff, #999); /* 銀色の立体感 */
            border-radius: 9px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.6);
            z-index: 100; /* 一番上に表示 */
        }
        .ring.left { left: 50px; }
        .ring.right { right: 50px; }

        /* めくれる1枚1枚のページ（紙） */
        .calendar-page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* 🌟 変更点2：ページ全体を真っ白にして「白色のフォトフレーム（縁）」にする */
            background-color: #ffffff; /* 純白 */
            border-radius: 3px 3px 15px 15px; /* 角を少し丸く */
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); /* 影を強くして浮かび上がらせる */
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 🌟 変更点3：Paddingを調整して、写真の周りに均等な白縁を作る */
            padding: 15px; /* 白い縁の厚さ */
            padding-bottom: 55px; /* 文字（〇ヶ月）を下に配置するためのスペース */
            box-sizing: border-box;
            
            /* めくれるアニメーションの軸を「上端」にする */
            transform-origin: top center; 
            transition: transform 0.6s ease-in, opacity 0.4s ease-in;
        }

        /* めくれた状態（上に90度パタンと倒れて消える） */
        .calendar-page.flipped {
            transform: rotateX(110deg); /* 90度以上倒して完全に隠す */
            opacity: 0;
        }

        /* カレンダー内の写真 */
        .calendar-img {
            width: 100%;
            height: 290px; /* 写真の高さを調整 */
            object-fit: cover; /* 画像の比率を保ったまま枠を埋める */
            border-radius: 2px;
            border: none; /* 写真自体の灰色の縁を消す（白いフレームが縁になるため） */
            background-color: #eee;
        }

        /* カレンダー内のテキスト（〇ヶ月） */
        .calendar-text {
            /* 🌟 変更点4：文字の色を白色の紙に映える濃い色に */
            color: #222; /* 濃いグレー */
            font-size: 2.1em;
            font-weight: bold;
            margin-top: 15px; /* Spacing adjusted */
            letter-spacing: 2px;
            text-shadow: none; /* 影を消してスッキリさせる */
        }

        /* =========================================
           ⏳ カウントダウン画面（最初は隠しておく）
           ========================================= */
        #countdown-container {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: #ff69b4; /* 可愛いピンク色 */
            font-size: 2.1em;
            letter-spacing: 2px;
            margin-bottom: 45px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* すりガラス風のオシャレな背景 */
            padding: 45px 35px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            display: inline-block;
        }

        .timer {
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        .timer span {
            font-size: 0.5em;
            color: #ffcc00; /* 金色のラベル */
            margin: 0 6px;
        }

        .back-link {
            display: inline-block;
            margin-top: 60px;
            text-decoration: none;
            color: #ff69b4;
            font-weight: bold;
            font-size: 1.25em;
            border-bottom: 2px solid #ff69b4;
            padding-bottom: 6px;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #ff1493;
            border-color: #ff1493;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="calendar-section">
        <div class="calendar-wrapper" id="calendar-wrapper">
            <div class="ring left"></div>
            <div class="ring right"></div>
            
            </div>
    </div>

    <div id="countdown-container">
        <h1 class="wafu-font">Countdown to our 1st Anniversary</h1>
        
        <div class="timer-box">
            <div class="timer" id="countdown"></div>
        </div>

        <br>
        <a href="index.html" class="back-link wafu-font">⬅ 神社の入口に戻る</a>
    </div>

    <script>
        // =========================================
        // 📅 1. カレンダーめくりの設定（JavaScript）
        // =========================================
        
        // 12ヶ月分のデータ（画像と文字）
        // ★ご自身の写真ファイル名に合わせてください（12枚）
        const monthData = [
            { image: 'month1.jpg', text: '1ヶ月' },
            { image: 'month2.jpg', text: '2ヶ月' },
            { image: 'month3.jpg', text: '3ヶ月' },
            { image: 'month4.jpg', text: '4ヶ月' },
            { image: 'month5.jpg', text: '5ヶ月' },
            { image: 'month6.jpg', text: '6ヶ月' },
            { image: 'month7.jpg', text: '7ヶ月' },
            { image: 'month8.jpg', text: '8ヶ月' },
            { image: 'month9.jpg', text: '9ヶ月' },
            { image: 'month10.jpg', text: '10ヶ月' },
            { image: 'month11.jpg', text: '11ヶ月' },
        ];

        const calendarWrapper = document.getElementById('calendar-wrapper');
        const calendarSection = document.getElementById('calendar-section');
        const countContainer = document.getElementById('countdown-container');
        
        let pages = []; // 生成したページ（DOM要素）を保存する配列

        // HTMLを生成してカレンダーを組み立てる関数
        function createCalendar() {
            // 1ヶ月目が一番上、12ヶ月目が一番下になるように配置する
            for (let i = 0; i < monthData.length; i++) {
                const page = document.createElement('div');
                page.className = 'calendar-page';
                // z-indexを使って重なり順を調整 (1ヶ月目が12、12ヶ月目が1)
                page.style.zIndex = monthData.length - i; 

                // ページ（白いフレーム）の中身を作成
                page.innerHTML = `
                    <img class="calendar-img" src="${monthData[i].image}" alt="${monthData[i].text}の写真">
                    <div class="calendar-text wafu-font">${monthData[i].text}</div>
                `;
                calendarWrapper.appendChild(page);
                pages.push(page); // 配列に追加
            }
        }

        // カレンダーをペラペラとめくる関数
        function startFlipping() {
            let currentIndex = 0;

            // 1.8秒ごとにペラッとめくる（時間を調整）
            const flipInterval = setInterval(() => {
                if (currentIndex < pages.length - 1) {
                    // 現在のページに 'flipped' クラスを付けて上にめくる（CSS発動）
                    pages[currentIndex].classList.add('flipped');
                    currentIndex++;
                } else {
                    // 12ヶ月目まで見せ終わったら、タイマーを止める
                    clearInterval(flipInterval);
                    
                    // 2.5秒ほど最後のページ（1年）を見せてから、カウントダウンへ移行
                    setTimeout(() => {
                        calendarSection.style.opacity = '0'; // カレンダー全体を消す
                        
                        setTimeout(() => {
                            calendarSection.style.display = 'none';
                            countContainer.style.display = 'block';
                            
                            // カウントダウンをフワッと表示
                            setTimeout(() => {
                                countContainer.style.opacity = '1';
                            }, 100);
                        }, 2000);
                    }, 2500); // 最後の余韻
                }
            }, 1800); // ★1枚あたりの表示時間（1800ミリ秒 = 1.8秒）
        }

        // ページが開かれたらカレンダーを生成して、めくり始める
        window.onload = () => {
            createCalendar();
            // 2.5秒待ってからめくり始める（エントランスからの繋がりのため少し長く）
            setTimeout(startFlipping, 2500); 
        };


        // =========================================
        // ⏳ 2. カウントダウンの設定（JavaScript）
        // =========================================
        // ★記念日の日付を設定してください（年-月-日T時間:分:秒）
        const targetDate = new Date("2026-03-26T00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // 記念日を過ぎた場合
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "🎉 おめでとう！これからの未来へ 🎉";
                document.getElementById("countdown").style.fontSize = "1.8em";
                return;
            }

            // 日、時間、分、秒の計算
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // カウントダウンのデザインをリッチにする
            document.getElementById("countdown").innerHTML = 
                days + "<span>日</span>" + 
                hours + "<span>時間</span>" + 
                minutes + "<span>分</span>" + 
                seconds + "<span>秒</span>";
        }, 1000); // 1秒ごとに更新
    </script>
</body>
</html>

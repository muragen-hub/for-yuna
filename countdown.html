<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1年の軌跡と、これから</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           基本設定
           ========================================= */
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #001f3f, #1a1a3a); 
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* 横スクロール防止 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wafu-font { font-family: 'Kiwi Maru', serif; }
        .eng-font { font-family: 'Montserrat', sans-serif; }

        /* =========================================
           📅 カレンダー部分
           ========================================= */
        #calendar-section {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 2s ease;
            z-index: 5;
        }

        .calendar-wrapper {
            position: relative;
            width: 85vw;
            max-width: 320px;
            height: 420px;
            perspective: 1500px;
            margin-top: 30px;
        }

        .ring {
            position: absolute;
            top: -18px;
            width: 18px;
            height: 38px;
            background: linear-gradient(to right, #ccc, #fff, #999);
            border-radius: 9px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.6);
            z-index: 100;
        }
        .ring.left { left: 50px; }
        .ring.right { right: 50px; }

        .calendar-page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            border-radius: 3px 3px 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            padding-bottom: 55px;
            box-sizing: border-box;
            transform-origin: top center; 
            transition: transform 0.6s ease-in, opacity 0.4s ease-in;
        }

        .calendar-page.flipped {
            transform: rotateX(110deg);
            opacity: 0;
        }

        .calendar-img {
            width: 100%;
            height: 290px;
            object-fit: cover;
            border-radius: 2px;
            background-color: #eee;
        }

        .calendar-text {
            color: #222;
            font-size: 2.1em;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* =========================================
           ⏳ カウントダウン & メッセージ画面
           ========================================= */
        #countdown-container {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            padding: 40px 20px;
            z-index: 10;
            width: 100%;
            box-sizing: border-box;
        }

        h1.eng-font {
            color: #ff69b4;
            font-size: 1.6em;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 35px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            display: inline-block;
            margin-bottom: 40px;
        }

        .timer {
            font-size: 3.2em;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .timer span {
            font-size: 0.4em;
            color: #ffcc00;
            margin: 0 5px;
            font-weight: 400;
        }

        /* 🌟 悠菜さんへのメッセージエリア */
        #message-section {
            opacity: 0;
            margin-top: 20px;
            padding: 20px;
        }

        .msg-text {
            font-size: 1.5em;
            line-height: 1.8;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .highlight {
            font-size: 1.2em;
            color: #ffcc00; /* 金色で目立たせる */
            display: block;
            margin-top: 10px;
        }

        .back-link {
            display: inline-block;
            margin-top: 50px;
            text-decoration: none;
            color: #ff69b4;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 2px solid #ff69b4;
            padding-bottom: 5px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="calendar-section">
        <div class="calendar-wrapper" id="calendar-wrapper">
            <div class="ring left"></div>
            <div class="ring right"></div>
            </div>
    </div>

    <div id="countdown-container">
        <h1 class="eng-font">Countdown to our<br>1st Anniversary</h1>
        
        <div class="timer-box">
            <div class="timer eng-font" id="countdown"></div>
        </div>

        <div id="message-section">
            <p class="wafu-font msg-text">
                悠菜へ<br>
                <span class="highlight">無理せず頑張ってね</span>
            </p>
        </div>

        <br>
        <a href="index.html" class="back-link wafu-font">⬅ 神社の入口に戻る</a>
    </div>

    <script>
        // --- カレンダーデータ ---
        const monthData = [
            { image: 'month1.jpg', text: '1ヶ月' },
            { image: 'month2.jpg', text: '2ヶ月' },
            { image: 'month3.jpg', text: '3ヶ月' },
            { image: 'month4.jpg', text: '4ヶ月' },
            { image: 'month5.jpg', text: '5ヶ月' },
            { image: 'month6.jpg', text: '6ヶ月' },
            { image: 'month7.jpg', text: '7ヶ月' },
            { image: 'month8.jpg', text: '8ヶ月' },
            { image: 'month9.jpg', text: '9ヶ月' },
            { image: 'month10.jpg', text: '10ヶ月' },
            { image: 'month11.jpg', text: '11ヶ月' }
        ];

        const calendarWrapper = document.getElementById('calendar-wrapper');
        const calendarSection = document.getElementById('calendar-section');
        const countContainer = document.getElementById('countdown-container');
        const messageSection = document.getElementById('message-section');
        let pages = [];

        // カレンダー生成
        function createCalendar() {
            for (let i = 0; i < monthData.length; i++) {
                const page = document.createElement('div');
                page.className = 'calendar-page';
                page.style.zIndex = monthData.length - i; 
                page.innerHTML = `
                    <img class="calendar-img" src="${monthData[i].image}" alt="${monthData[i].text}">
                    <div class="calendar-text wafu-font">${monthData[i].text}</div>
                `;
                calendarWrapper.appendChild(page);
                pages.push(page);
            }
        }

        // めくるアニメーション
        function startFlipping() {
            let currentIndex = 0;
            const flipInterval = setInterval(() => {
                if (currentIndex < pages.length - 1) {
                    pages[currentIndex].classList.add('flipped');
                    currentIndex++;
                } else {
                    clearInterval(flipInterval);
                    setTimeout(() => {
                        calendarSection.style.opacity = '0';
                        setTimeout(() => {
                            calendarSection.style.display = 'none';
                            countContainer.style.display = 'block';
                            setTimeout(() => {
                                countContainer.style.opacity = '1';
                                // 🌟 カウントダウンが出てから3秒後にメッセージをふわっと出す
                                setTimeout(() => {
                                    messageSection.style.transition = 'opacity 2.5s ease';
                                    messageSection.style.opacity = '1';
                                }, 3000);
                            }, 100);
                        }, 2000);
                    }, 2500);
                }
            }, 1800);
        }

        window.onload = () => {
            createCalendar();
            setTimeout(startFlipping, 2500); 
        };

        // --- カウントダウンロジック ---
        const targetDate = new Date("2026-03-26T00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "🎉 Happy Anniversary 🎉";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                days + "<span>Days</span>" + 
                hours + "<span>Hrs</span>" + 
                minutes + "<span>Min</span>" + 
                seconds + "<span>Sec</span>";
        }, 1000);
    </script>
</body>
</html>

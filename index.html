<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お疲れ様！特別な一日おみくじ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           ✨ 全体の基本設定（CSS）
           ========================================= */
        :root {
            --bg-color-day: #fff0f5; /* おみくじ画面の背景 */
            --torii-red: #c9171e;   /* 鳥居の赤 */
            --candle-fire: #ff9d00;  /* ろうそくの炎 */
            --text-color: #333;
            --main-pink: #ff69b4;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: var(--bg-color-day);
            color: var(--text-color);
            transition: background-color 2s ease;
        }

        /* 和風フォントをタイトル等に適用 */
        .wafu-font {
            font-family: 'Kiwi Maru', serif;
            font-weight: 500;
        }

        /* =========================================
           ⛩️ エントランス画面（HTML+CSS）
           ========================================= */
        #entrance-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #050510, #13132e); /* 深夜の空 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            /* くぐる時のアニメーション（JSでクラスを追加して発動） */
            transition: transform 1.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 1.5s ease-in;
        }

        /* 【重要】鳥居をくぐる時のズーム＆フェードアウト効果 */
        .pass-through {
            transform: scale(4); /* 4倍にズーム */
            opacity: 0;
            pointer-events: none; /* クリック不可に */
        }

        /* --- CSSで作る鳥居 --- */
        .torii-container {
            position: relative;
            width: 300px;
            height: 280px;
            margin-bottom: 30px;
        }
        /* 一番上の笠木 */
        .torii-kasagi {
            position: absolute; top: 40px; left: 0;
            width: 300px; height: 25px; background: var(--torii-red);
            border-radius: 5px 5px 0 0; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        /* 2段目の貫 */
        .torii-nuki {
            position: absolute; top: 90px; left: -10px;
            width: 320px; height: 18px; background: var(--torii-red);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        /* 柱（グラデーションで立体感を） */
        .torii-hashira {
            position: absolute; top: 40px;
            width: 30px; height: 240px;
            background: linear-gradient(to right, #a01217, var(--torii-red), #a01217);
        }
        .torii-hashira.left { left: 50px; }
        .torii-hashira.right { right: 50px; }

        /* --- 石畳の参道（遠近感） --- */
        .stone-path {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%) perspective(150px) rotateX(45deg);
            width: 100px;
            height: 180px;
            background: repeating-linear-gradient(to bottom, #2a2a2a, #2a2a2a 18px, #1a1a1a 18px, #1a1a1a 20px);
            z-index: -1;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.1);
        }

        /* --- 揺らめくろうそく --- */
        .candle {
            position: absolute;
            bottom: 40px;
            width: 8px;
            height: 25px;
            background: #eee;
        }
        .candle.left { left: 15px; }
        .candle.right { right: 15px; }
        
        .flame {
            position: absolute;
            top: -18px; left: -6px;
            width: 20px; height: 25px;
            background: var(--candle-fire);
            border-radius: 50% 50% 20% 20%;
            /* 炎の揺らめきアニメーション */
            animation: flicker 0.15s infinite alternate;
        }
        
        @keyframes flicker {
            0% { transform: scale(0.9) rotate(-2deg); opacity: 0.8; box-shadow: 0 0 15px var(--candle-fire); }
            100% { transform: scale(1.1) rotate(2deg); opacity: 1; box-shadow: 0 0 25px var(--candle-fire), 0 0 40px #ff5e00; }
        }

        /* 鳥居をくぐるボタン */
        #enter-btn {
            padding: 15px 50px;
            font-size: 1.3em;
            font-weight: 700;
            background-color: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            border-radius: 30px;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.8);
            transition: 0.3s;
            margin-top: 20px;
        }
        #enter-btn:hover { background-color: rgba(255, 204, 0, 0.15); transform: scale(1.05); }

        /* =========================================
           🌸 おみくじ画面（メインコンテンツ）
           ========================================= */
        #main-content {
            display: none; /* 最初は隠す */
            padding: 40px 20px;
            opacity: 0;
            transition: opacity 1.5s ease-in; /* フワッと表示 */
        }
        h1 { color: var(--main-pink); margin-bottom: 30px; }
        
        #omikuji-scene {
            position: relative;
            width: 120px; height: 180px;
            margin: 0 auto 30px;
        }
        #box-front {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 80px; height: 120px; background: linear-gradient(to right, #d2691e, #8b4513);
            border-radius: 10px 10px 20px 20px; z-index: 3; box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        #box-top {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 84px; height: 15px; background-color: #b22222; border-radius: 5px; z-index: 4;
        }
        #stick {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 24px; height: 100px; background-color: #f5deb3; border: 1px solid #deb887;
            z-index: 2; writing-mode: vertical-rl; text-align: center; font-size: 16px;
            font-weight: bold; color: #333; padding-top: 5px; border-radius: 3px;
            transition: transform 1.2s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* 振るアニメーション */
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-12deg); }
            75% { transform: rotate(12deg); }
        }
        .shaking { animation: shake 0.15s infinite; transform-origin: bottom center; }
        .drawn #stick { transform: translate(-50%, -115px); }

        .action-btn {
            padding: 15px 40px; font-size: 1.2em; font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 700; background-color: var(--main-pink); color: white; border: none;
            border-radius: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: 0.3s;
        }
        .action-btn:hover { background-color: #ff1493; transform: scale(1.05); }
        .action-btn:disabled { background-color: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #result-box {
            margin-top: 20px; padding: 20px; opacity: 0; 
            transition: opacity 1s ease, transform 1s ease; transform: translateY(20px);
        }
        #result-box.show { opacity: 1; transform: translateY(0); }

        #rank { font-size: 2.3em; font-weight: 700; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #message { font-size: 1.3em; line-height: 1.7; }
        #photo {
            max-width: 85%; max-height: 400px; height: auto; border-radius: 15px;
            margin-top: 25px; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-left: auto; margin-right: auto;
        }
        .next-link {
            display: inline-block; margin-top: 35px; text-decoration: none; color: var(--main-pink);
            font-weight: bold; font-size: 1.1em; border-bottom: 2px solid var(--main-pink); padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="https://sc.mp3-list.com/mp3/58/5826f0ac711d9d968b577458145789f2.mp3" type="audio/mp3">
    </audio>
    <audio id="se-pass" preload="auto">
        <source src="https://soundeffect-lab.info/sound/anime/mp3/shakin1.mp3" type="audio/mp3">
    </audio>
    <audio id="se-shake" loop preload="auto">
        <source src="https://soundeffect-lab.info/sound/various/mp3/maracas1.mp3" type="audio/mp3">
    </audio>
    <audio id="se-result" preload="auto">
        <source src="https://soundeffect-lab.info/sound/japan/mp3/hyoushigi1.mp3" type="audio/mp3">
    </audio>

    <div id="entrance-screen">
        <div class="torii-container">
            <div class="torii-kasagi"></div>
            <div class="torii-nuki"></div>
            <div class="torii-hashira left"></div>
            <div class="torii-hashira right"></div>
            
            <div class="candle left"><div class="flame"></div></div>
            <div class="candle right"><div class="flame"></div></div>
            <div class="stone-path"></div>
        </div>
        <p class="wafu-font" style="color: #fff; font-size: 1.3em; letter-spacing: 3px; margin-bottom: 0;">一日の癒やし、特別な場所へ</p>
        <button id="enter-btn" class="wafu-font" onclick="passTorii()">鳥居をくぐる</button>
    </div>

    <div id="main-content">
        <h1 class="wafu-font">今日もお仕事お疲れ様！</h1>
        
        <div id="omikuji-scene">
            <div id="stick"></div> <div id="box-top"></div> <div id="box-front"></div> 
        </div>

        <p>心を込めて振ってみてね</p>
        <button id="draw-btn" class="action-btn wafu-font" onclick="startOmikuji()">おみくじを振る</button>

        <div id="result-box">
            <div id="rank" class="wafu-font"></div>
            <div id="message"></div>
            <img id="photo" src="" alt="二人の思い出の写真">
        </div>

        <a href="countdown.html" class="next-link" id="next-link">次のページへ ➔</a>
    </div>

    <script>
        // ★ご自身の写真ファイル名に合わせてください
        const photoList = [
            'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg'
        ];

        // 各要素の取得
        const bgm = document.getElementById('bgm');
        const sePass = document.getElementById('se-pass');
        const seShake = document.getElementById('se-shake');
        const seResult = document.getElementById('se-result');
        
        const entrance = document.getElementById('entrance-screen');
        const mainContent = document.getElementById('main-content');
        const drawBtn = document.getElementById('draw-btn');

        // ページ読み込み時のチェック（1日1回限定）
        window.onload = function() {
            const lastDrawDate = localStorage.getItem('omikujiDate');
            const today = new Date().toDateString(); 

            if (lastDrawDate === today) {
                // すでに引いている場合、おみくじ画面のボタンをロック
                drawBtn.disabled = true;
                drawBtn.innerText = "今日のおみくじは終了！また明日ね";
            }
        };

        // ⛩️ 演出1：鳥居をくぐる
        function passTorii() {
            // 音響再生：BGM開始（スマホ対応のためクリックイベント内で再生）
            bgm.volume = 0.5;
            bgm.play();
            // 音響再生：くぐる音
            sePass.play();

            // CSSアニメーション発動（ズーム）
            entrance.classList.add('pass-through');

            // 1.5秒後、完全に画面を切り替える
            setTimeout(() => {
                entrance.style.display = 'none';
                mainContent.style.display = 'block';
                
                // ほんの少し遅らせておみくじ画面をフワッと表示
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                }, 100);
            }, 1500);
        }

        // 🌸 演出2：おみくじを振る
        function startOmikuji() {
            const scene = document.getElementById('omikuji-scene');
            const stick = document.getElementById('stick');
            const resultBox = document.getElementById('result-box');
            const nextLink = document.getElementById('next-link');
            
            // 連続クリック防止
            drawBtn.disabled = true;
            drawBtn.innerText = "心を込めて...";

            // 前回の結果をリセット
            resultBox.classList.remove('show');
            scene.classList.remove('drawn');
            stick.innerText = ""; 

            // 音響再生：シャカシャカ音
            seShake.play();
            // アニメーション発動：振る
            scene.classList.add('shaking');

            // 2秒間振る
            setTimeout(() => {
                // 振るのを止める
                scene.classList.remove('shaking');
                seShake.pause(); // 音を止める
                seShake.currentTime = 0; // 音を頭に戻す
                
                // 結果の決定
                const rand = Math.random(); 
                let rankText = ""; let rankHtml = ""; let messageText = ""; let showPhoto = false;

                if (rand < 0.10) {
                    rankText = "大大吉"; rankHtml = "🌟 大大吉 🌟"; 
                    messageText = "You're the most beautiful woman!<br>Fighting! マキシマイザー";
                } else if (rand < 0.50) {
                    rankText = "大吉"; rankHtml = "🍺 大吉 🍺";
                    messageText = "無理せず。酒がなきゃやってられねえぜのあなたに!";
                } else {
                    rankText = "吉"; rankHtml = "💖 吉 💖";
                    messageText = "いつも頑張ってて尊敬してるよ。<br>これ見て癒されてね";
                    showPhoto = true;
                }

                // 棒に文字をセットして飛び出させる（演出）
                stick.innerText = rankText;
                scene.classList.add('drawn');

                // 棒が出きった頃（1.2秒後）に、下のメッセージと写真をフワッと表示
                setTimeout(() => {
                    // 音響再生：拍子木（ジャーン！）
                    seResult.play();

                    const rankDiv = document.getElementById('rank');
                    rankDiv.innerHTML = rankHtml;
                    // 色の設定
                    if (rankText === "大大吉") rankDiv.style.color = "#ff1493";
                    else if (rankText === "大吉") rankDiv.style.color = "#ff8c00";
                    else rankDiv.style.color = var(--main-pink);

                    document.getElementById('message').innerHTML = messageText;
                    
                    const photoImg = document.getElementById('photo');
                    if (showPhoto && photoList.length > 0) {
                        const randomIndex = Math.floor(Math.random() * photoList.length);
                        photoImg.src = photoList[randomIndex];
                        photoImg.style.display = 'block'; 
                    } else {
                        photoImg.style.display = 'none';
                    }

                    // フワッと表示
                    resultBox.classList.add('show');
                    drawBtn.innerText = "また明日引いてね！";
                    
                    // 日付を記憶（1日1回限定）
                    localStorage.setItem('omikujiDate', new Date().toDateString());

                    // ★演出3：15秒のカウントダウンと自動移動機能
                    let timeLeft = 15;
                    nextLink.innerText = `次のページへ ➔ (${timeLeft}秒後に自動移動)`;
                    
                    const countdownTimer = setInterval(() => {
                        timeLeft--;
                        if (timeLeft > 0) {
                            nextLink.innerText = `次のページへ ➔ (${timeLeft}秒後に自動移動)`;
                        } else {
                            // 0秒になったらタイマーを止めて移動
                            clearInterval(countdownTimer);
                            window.location.href = 'countdown.html';
                        }
                    }, 1000); 

                }, 1200); // 棒が出るアニメーション時間を待つ

            }, 2000); // 振る時間
        }
    </script>
</body>
</html>

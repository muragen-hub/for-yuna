<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お疲れ様！おみくじ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            text-align: center;
            background-color: #fff0f5; 
            color: #333;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        h1 { color: #ff69b4; margin-bottom: 30px; }
        
        #omikuji-scene {
            position: relative;
            width: 120px;
            height: 180px;
            margin: 0 auto 30px;
        }
        #box-front {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 120px;
            background: linear-gradient(to right, #d2691e, #8b4513);
            border-radius: 10px 10px 20px 20px;
            z-index: 3;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        #box-top {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 84px;
            height: 15px;
            background-color: #b22222;
            border-radius: 5px;
            z-index: 4;
        }
        #stick {
            position: absolute;
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 100px;
            background-color: #f5deb3; 
            border: 1px solid #deb887;
            z-index: 2; 
            writing-mode: vertical-rl; 
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            padding-top: 5px;
            border-radius: 3px;
            transition: transform 1s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }
        .shaking {
            animation: shake 0.2s infinite;
            transform-origin: bottom center; 
        }
        .drawn #stick {
            transform: translate(-50%, -110px); 
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 700;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        button:hover { background-color: #ff1493; transform: scale(1.05); }
        button:disabled { background-color: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #result-box {
            margin-top: 20px;
            padding: 20px;
            opacity: 0; 
            transition: opacity 0.8s ease, transform 0.8s ease;
            transform: translateY(20px);
        }
        #result-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        #rank { font-size: 2.2em; font-weight: 700; margin-bottom: 15px; }
        #message { font-size: 1.3em; line-height: 1.6; }
        #photo {
            max-width: 80%;
            max-height: 400px;
            height: auto;
            border-radius: 15px;
            margin-top: 20px;
            display: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            margin-left: auto;
            margin-right: auto;
        }
        .next-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #ff69b4;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 2px solid #ff69b4;
            padding-bottom: 5px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <h1>今日もお仕事お疲れ様！</h1>
    
    <div id="omikuji-scene">
        <div id="stick"></div> <div id="box-top"></div> <div id="box-front"></div> 
    </div>

    <p>振ってみて</p>
    <button id="draw-btn" onclick="startOmikuji()">おみくじを振る</button>

    <div id="result-box">
        <div id="rank"></div>
        <div id="message"></div>
        <img id="photo" src="" alt="二人の思い出の写真">
    </div>

    <a href="countdown.html" class="next-link" id="next-link">次のページへ ➔</a>

    <script>
        // ★ご自身の写真ファイル名に合わせてください
        const photoList = [
            'photo1.jpg',
            'photo2.jpg',
            'photo3.jpg',
            'photo4.jpg'
        ];

        window.onload = function() {
            const lastDrawDate = localStorage.getItem('omikujiDate');
            const today = new Date().toDateString(); 

            if (lastDrawDate === today) {
                const btn = document.getElementById('draw-btn');
                btn.disabled = true;
                btn.innerText = "今日のおみくじは終了！また明日ね";
            }
        };

        function startOmikuji() {
            const btn = document.getElementById('draw-btn');
            const scene = document.getElementById('omikuji-scene');
            const stick = document.getElementById('stick');
            const resultBox = document.getElementById('result-box');
            const nextLink = document.getElementById('next-link');
            
            btn.disabled = true;
            btn.innerText = "シャカシャカ...";

            resultBox.classList.remove('show');
            scene.classList.remove('drawn');
            stick.innerText = ""; 

            scene.classList.add('shaking');

            setTimeout(() => {
                scene.classList.remove('shaking');
                
                const rand = Math.random(); 
                let rankText = "";
                let rankHtml = "";
                let messageText = "";
                let showPhoto = false;

                if (rand < 0.10) {
                    rankText = "大大吉"; 
                    rankHtml = "大大吉"; 
                    messageText = "You're the most beautiful woman! Fighting! マキシマイザー";
                } else if (rand < 0.50) {
                    rankText = "大吉";
                    rankHtml = "大吉";
                    messageText = "無理せず。酒がなきゃやってられねえぜのあなたに!";
                } else {
                    rankText = "吉";
                    rankHtml = "吉";
                    messageText = "いつも頑張ってて尊敬してるよ。これ見て癒されてね";
                    showPhoto = true;
                }

                stick.innerText = rankText;
                scene.classList.add('drawn');

                setTimeout(() => {
                    document.getElementById('rank').innerHTML = rankHtml;
                    if (rankText === "大大吉") {
                        document.getElementById('rank').style.color = "#ff1493";
                    } else if (rankText === "大吉") {
                        document.getElementById('rank').style.color = "#ff8c00";
                    } else {
                        document.getElementById('rank').style.color = "#ff69b4";
                    }

                    document.getElementById('message').innerText = messageText;
                    
                    const photoImg = document.getElementById('photo');
                    if (showPhoto && photoList.length > 0) {
                        const randomIndex = Math.floor(Math.random() * photoList.length);
                        photoImg.src = photoList[randomIndex];
                        photoImg.style.display = 'block'; 
                    } else {
                        photoImg.style.display = 'none';
                    }

                    resultBox.classList.add('show');
                    btn.innerText = "また明日引いてね！";
                    localStorage.setItem('omikujiDate', new Date().toDateString());

                    // ★ここから追加：15秒のカウントダウンと自動移動機能
                    let timeLeft = 15;
                    nextLink.innerText = `次のページへ ➔ (${timeLeft}秒後に自動移動)`;
                    
                    const countdownTimer = setInterval(() => {
                        timeLeft--;
                        if (timeLeft > 0) {
                            // 1秒ごとに文字を書き換える
                            nextLink.innerText = `次のページへ ➔ (${timeLeft}秒後に自動移動)`;
                        } else {
                            // 0秒になったらタイマーを止めて、自動でページ移動
                            clearInterval(countdownTimer);
                            window.location.href = 'countdown.html';
                        }
                    }, 1000); // 1000ミリ秒（1秒）ごとに実行

                }, 1000); 
            }, 1500); 
        }
    </script>
</body>
</html>

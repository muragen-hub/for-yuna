<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お疲れ様！特別な一日おみくじ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           ✨ 全体の基本設定
           ========================================= */
        :root {
            --torii-red: #c9171e;  
            --candle-fire: #ff9d00; 
            --main-pink: #ff69b4;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: linear-gradient(to bottom, #0a0a23 0%, #1a1a3c 50%, #2a2a5a 100%);
            color: #ffffff;
            transition: background 2s ease;
            min-height: 100vh;
        }

        .wafu-font { font-family: 'Kiwi Maru', serif; font-weight: 500; }

        /* =========================================
           ⛩️ エントランス画面（鳥居）
           ========================================= */
        #entrance-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #050510, #13132e);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            transition: transform 1.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 1.5s ease-in;
        }
        .pass-through { transform: scale(4); opacity: 0; pointer-events: none; }
        .torii-container { position: relative; width: 300px; height: 280px; margin-bottom: 30px; }
        .torii-kasagi { position: absolute; top: 40px; left: 0; width: 300px; height: 25px; background: var(--torii-red); border-radius: 5px 5px 0 0; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
        .torii-nuki { position: absolute; top: 90px; left: -10px; width: 320px; height: 18px; background: var(--torii-red); box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
        .torii-hashira { position: absolute; top: 40px; width: 30px; height: 240px; background: linear-gradient(to right, #a01217, var(--torii-red), #a01217); }
        .torii-hashira.left { left: 50px; } .torii-hashira.right { right: 50px; }
        .stone-path { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%) perspective(150px) rotateX(45deg); width: 100px; height: 180px; background: repeating-linear-gradient(to bottom, #2a2a2a, #2a2a2a 18px, #1a1a1a 18px, #1a1a1a 20px); z-index: -1; }
        .candle { position: absolute; bottom: 40px; width: 8px; height: 25px; background: #eee; }
        .candle.left { left: 15px; } .candle.right { right: 15px; }
        .flame { position: absolute; top: -18px; left: -6px; width: 20px; height: 25px; background: var(--candle-fire); border-radius: 50% 50% 20% 20%; animation: flicker 0.15s infinite alternate; }
        @keyframes flicker { 0% { transform: scale(0.9) rotate(-2deg); opacity: 0.8; box-shadow: 0 0 15px var(--candle-fire); } 100% { transform: scale(1.1) rotate(2deg); opacity: 1; box-shadow: 0 0 25px var(--candle-fire), 0 0 40px #ff5e00; } }

        #enter-btn {
            padding: 15px 50px; font-size: 1.3em; font-weight: 700; background-color: transparent; color: #ffcc00;
            border: 2px solid #ffcc00; border-radius: 30px; cursor: pointer; text-shadow: 0 0 10px rgba(255, 204, 0, 0.8); transition: 0.3s;
        }

        /* =========================================
           🌸 おみくじ画面（メイン）
           ========================================= */
        #main-content { display: none; padding: 40px 20px; opacity: 0; transition: opacity 1.5s ease-in; }
        h1 { color: #ffb6c1; margin-bottom: 30px; text-shadow: 0 0 15px rgba(255, 182, 193, 0.5); }
        
        #omikuji-scene { position: relative; width: 120px; height: 180px; margin: 0 auto 30px; }
        #box-front { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 120px; background: linear-gradient(to right, #d2691e, #8b4513); border-radius: 10px 10px 20px 20px; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #box-top { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 84px; height: 15px; background-color: #b22222; border-radius: 5px; z-index: 11; }
        
        /* 🌟 おみくじの棒の設定 */
        #stick { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 28px; height: 110px; background-color: #f5deb3; border: 1px solid #deb887;
            z-index: 5; writing-mode: vertical-rl; text-align: center; font-size: 18px;
            font-weight: bold; color: #333; padding-top: 8px; border-radius: 3px;
            transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.16, 0.99), opacity 0.5s;
        }

        /* 🌟 棒が引かれた時のアニメーション（重ならず手前に拡大） */
        .drawn #stick { 
            transform: translate(-50%, -30px) scale(2.5); 
            z-index: 100; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-12deg); } 75% { transform: rotate(12deg); } }
        .shaking { animation: shake 0.15s infinite; transform-origin: bottom center; }

        .action-btn { padding: 15px 40px; font-size: 1.2em; font-weight: 700; background-color: var(--main-pink); color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); transition: 0.3s; }
        .action-btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        #result-box { margin-top: 40px; padding: 20px; opacity: 0; transition: 1s; transform: translateY(20px); }
        #result-box.show { opacity: 1; transform: translateY(0); }

        #rank { font-size: 3em; font-weight: 700; margin-bottom: 15px; }
        #message { font-size: 1.3em; line-height: 1.7; color: #eee; margin-bottom: 20px; }
        #photo { max-width: 90%; max-height: 350px; border-radius: 15px; display: none; margin: 20px auto; box-shadow: 0 0 25px rgba(255,255,255,0.2); }
        
        .next-link { display: none; margin-top: 20px; text-decoration: none; color: #ffb6c1; font-weight: bold; font-size: 1.2em; border-bottom: 2px solid #ffb6c1; padding-bottom: 5px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="https://sc.mp3-list.com/mp3/58/5826f0ac711d9d968b577458145789f2.mp3" type="audio/mp3"></audio>
    <audio id="se-pass"><source src="https://soundeffect-lab.info/sound/anime/mp3/shakin1.mp3" type="audio/mp3"></audio>
    <audio id="se-shake" loop><source src="https://soundeffect-lab.info/sound/various/mp3/maracas1.mp3" type="audio/mp3"></audio>
    <audio id="se-result"><source src="https://soundeffect-lab.info/sound/japan/mp3/hyoushigi1.mp3" type="audio/mp3"></audio>

    <div id="entrance-screen">
        <div class="torii-container">
            <div class="torii-kasagi"></div><div class="torii-nuki"></div><div class="torii-hashira left"></div><div class="torii-hashira right"></div>
            <div class="candle left"><div class="flame"></div></div><div class="candle right"><div class="flame"></div></div><div class="stone-path"></div>
        </div>
        <p class="wafu-font" style="color: #fff; font-size: 1.3em; letter-spacing: 3px; margin-bottom: 30px;">一日の癒やし、特別な場所へ</p>
        <button id="enter-btn" class="wafu-font" onclick="passTorii()">鳥居をくぐる</button>
    </div>

    <div id="main-content">
        <h1 class="wafu-font">今日もお仕事お疲れ様！</h1>
        <div id="omikuji-scene"><div id="stick"></div><div id="box-top"></div><div id="box-front"></div></div>
        <p id="sub-msg">心を込めて振ってみてね</p>
        <button id="draw-btn" class="action-btn wafu-font" onclick="startOmikuji()">おみくじを振る</button>
        
        <div id="result-box">
            <div id="rank" class="wafu-font"></div>
            <div id="message"></div>
            <img id="photo" src="" alt="思い出の写真">
            <br>
            <a href="countdown.html" class="next-link wafu-font" id="next-link">二人の思い出を見る ➔</a>
        </div>
    </div>

    <script>
        const photoList = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg'];
        const bgm = document.getElementById('bgm');
        const sePass = document.getElementById('se-pass');
        const seShake = document.getElementById('se-shake');
        const seResult = document.getElementById('se-result');
        const entrance = document.getElementById('entrance-screen');
        const mainContent = document.getElementById('main-content');
        const drawBtn = document.getElementById('draw-btn');

        // 🌟 1日1回チェック
        window.onload = function() {
            const lastDrawDate = localStorage.getItem('omikujiDate');
            const today = new Date().toDateString(); 
            if (lastDrawDate === today) {
                drawBtn.disabled = true;
                drawBtn.innerText = "今日のおみくじは終了！<br>また明日ね";
                document.getElementById('next-link').style.display = "inline-block";
            }
        };

        function passTorii() {
            bgm.volume = 0.4; bgm.play().catch(e => {});
            sePass.play().catch(e => {});
            entrance.classList.add('pass-through');
            setTimeout(() => {
                entrance.style.display = 'none';
                mainContent.style.display = 'block';
                setTimeout(() => { mainContent.style.opacity = '1'; }, 100);
            }, 1500);
        }

        function startOmikuji() {
            const scene = document.getElementById('omikuji-scene');
            const stick = document.getElementById('stick');
            const resultBox = document.getElementById('result-box');
            
            drawBtn.disabled = true;
            drawBtn.innerText = "心を込めて...";
            seShake.play().catch(e => {});
            scene.classList.add('shaking');

            setTimeout(() => {
                scene.classList.remove('shaking');
                seShake.pause(); seShake.currentTime = 0; 
                
                // 後光演出
                document.body.style.background = "linear-gradient(to bottom, #1a1a3c 0%, #2a2a5a 50%, #4a4a8a 100%)";
                
                const rand = Math.random(); 
                let rankText = "", messageText = "", showPhoto = false;

                if (rand < 0.10) {
                    rankText = "大大吉";
                    messageText = "You're the most beautiful woman!<br>マキシマイザーをプレゼント！";
                } else if (rand < 0.50) {
                    rankText = "大吉";
                    messageText = "無理せず。酒がなきゃやってられねえぜのあなたに！<br>今日は美味しいお酒を飲もう。";
                } else {
                    rankText = "吉";
                    messageText = "いつも頑張ってて尊敬してるよ。<br>これ見て癒されてね";
                    showPhoto = true;
                }

                stick.innerText = rankText;
                scene.classList.add('drawn');

                setTimeout(() => {
                    seResult.play().catch(e => {});
                    const rankDiv = document.getElementById('rank');
                    rankDiv.innerHTML = rankText;
                    rankDiv.style.color = "#fff";
                    
                    // 🌟 ランクに合わせた発光
                    if (rankText === "大大吉") rankDiv.style.textShadow = "0 0 20px #ff1493, 0 0 40px #ff1493";
                    else if (rankText === "大吉") rankDiv.style.textShadow = "0 0 20px #ff8c00, 0 0 40px #ff8c00";
                    else rankDiv.style.textShadow = "0 0 20px #ff69b4, 0 0 40px #ff69b4";

                    document.getElementById('message').innerHTML = messageText;
                    
                    if (showPhoto) {
                        const photoImg = document.getElementById('photo');
                        photoImg.src = photoList[Math.floor(Math.random() * photoList.length)];
                        photoImg.style.display = 'block'; 
                    }

                    resultBox.classList.add('show');
                    drawBtn.innerHTML = "今日のおみくじは終了！";
                    localStorage.setItem('omikujiDate', new Date().toDateString());
                    
                    // 🌟 次へのリンクを表示
                    document.getElementById('next-link').style.display = "inline-block";
                }, 1500);
            }, 2000); 
        }
    </script>
</body>
</html>
